<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
            color: #eee;
            font-size: 1.1rem;
        }

        .score-board span {
            color: #0f3460;
            background: #e94560;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
        }

        canvas {
            border: 2px solid #e94560;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
            background: #16213e;
            display: block;
            margin: 0 auto;
        }

        .controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.85rem;
        }

        .controls kbd {
            background: #0f3460;
            color: #e94560;
            padding: 2px 8px;
            border-radius: 3px;
            border: 1px solid #e94560;
            margin: 0 2px;
        }

        .restart-btn {
            margin-top: 12px;
            padding: 8px 24px;
            font-size: 1rem;
            background: transparent;
            color: #e94560;
            border: 2px solid #e94560;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .restart-btn:hover {
            background: #e94560;
            color: #1a1a2e;
        }

        .game-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e94560;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(233, 69, 96, 0.7);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        <div class="score-board">
            得分: <span id="score">0</span>
            最高分: <span id="highScore">0</span>
        </div>
        <div style="position: relative;">
            <canvas id="canvas"></canvas>
            <div class="game-overlay" id="overlay" style="display: none;">游戏结束</div>
        </div>
        <button class="restart-btn" id="restartBtn">重新开始</button>
        <div class="controls">
            <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制方向
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const restartBtn = document.getElementById('restartBtn');

        // 游戏配置
        const GRID_SIZE = 20;
        const TILE_COUNT = 20;
        const TILE_SIZE = GRID_SIZE;
        canvas.width = TILE_COUNT * GRID_SIZE;
        canvas.height = TILE_COUNT * GRID_SIZE;

        // 游戏状态
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = {};
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gameLoop = null;
        let speed = 100;

        highScoreEl.textContent = highScore;

        // 初始化游戏
        function initGame() {
            // 蛇从中间开始，初始3节
            const startX = Math.floor(TILE_COUNT / 2);
            const startY = Math.floor(TILE_COUNT / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY },
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 100;
            scoreEl.textContent = score;
            overlay.style.display = 'none';
            placeFood();
        }

        // 随机放置食物
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * TILE_COUNT),
                    y: Math.floor(Math.random() * TILE_COUNT),
                };
            } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            gameLoop = null;
            overlay.style.display = 'block';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
        }

        // 更新游戏
        function update() {
            // 应用方向
            direction = { ...nextDirection };

            // 新的蛇头
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y,
            };

            // 撞墙检测
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                gameOver();
                return;
            }

            // 撞自己检测
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                placeFood();
                // 加速
                if (speed > 40) {
                    speed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                snake.pop();
            }
        }

        // 绘制
        function draw() {
            // 清空画布
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格线
            ctx.strokeStyle = 'rgba(233, 69, 96, 0.05)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= TILE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * TILE_SIZE, 0);
                ctx.lineTo(i * TILE_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * TILE_SIZE);
                ctx.lineTo(canvas.width, i * TILE_SIZE);
                ctx.stroke();
            }

            // 绘制食物
            ctx.fillStyle = '#e94560';
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(
                food.x * TILE_SIZE + TILE_SIZE / 2,
                food.y * TILE_SIZE + TILE_SIZE / 2,
                TILE_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((seg, i) => {
                const x = seg.x * TILE_SIZE;
                const y = seg.y * TILE_SIZE;
                const padding = 1;

                if (i === 0) {
                    // 蛇头
                    ctx.fillStyle = '#0f3460';
                    ctx.fillRect(x + padding, y + padding, TILE_SIZE - padding * 2, TILE_SIZE - padding * 2);
                    ctx.strokeStyle = '#e94560';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + padding, y + padding, TILE_SIZE - padding * 2, TILE_SIZE - padding * 2);
                    // 眼睛
                    ctx.fillStyle = '#eee';
                    const eyeSize = 3;
                    let eye1X, eye1Y, eye2X, eye2Y;
                    if (direction.x === 1) {
                        eye1X = x + 14; eye1Y = y + 5; eye2X = x + 14; eye2Y = y + 13;
                    } else if (direction.x === -1) {
                        eye1X = x + 4; eye1Y = y + 5; eye2X = x + 4; eye2Y = y + 13;
                    } else if (direction.y === -1) {
                        eye1X = x + 5; eye1Y = y + 4; eye2X = x + 13; eye2Y = y + 4;
                    } else {
                        eye1X = x + 5; eye1Y = y + 14; eye2X = x + 13; eye2Y = y + 14;
                    }
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // 蛇身 - 渐变颜色
                    const ratio = i / snake.length;
                    const r = Math.floor(15 + ratio * 10);
                    const g = Math.floor(52 + ratio * 150);
                    const b = Math.floor(96 - ratio * 60);
                    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                    ctx.fillRect(x + padding, y + padding, TILE_SIZE - padding * 2, TILE_SIZE - padding * 2);
                }
            });
        }

        // 游戏主循环（合并 update + draw）
        function tick() {
            update();
            if (gameRunning) {
                draw();
            }
        }

        // 开始游戏
        function startGame() {
            if (gameLoop) clearInterval(gameLoop);
            initGame();
            gameRunning = true;
            draw();
            gameLoop = setInterval(tick, speed);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
            }
        });

        // 重新开始按钮
        restartBtn.addEventListener('click', startGame);

        // 自动开始
        startGame();
    </script>
</body>
</html>
